<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker News - Delete confirm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f6f6ef;
        }
        /* Estilos generales para el contenedor principal */
        .main-container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #f6f6ef;
        }
        /* Estilos para la cabecera */
        .header {
            background-color: #ff6600;
            padding: 5px 0;
            border-bottom: 1px solid #e2e2e2;
        }
        .header .pagetop {
            color: white;
            padding: 0 10px;
        }
        .header a {
            color: white;
            margin-right: 10px;
            text-decoration: none;
        }
        .header .hnname a {
            font-weight: bold;
            color: white;
        }
        /* Estilos para el contenedor de contenido */
        .container {
            background-color: white;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #e2e2e2;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .news-item a {
            color: #000;
            text-decoration: none;
        }
        .news-item a:hover {
            text-decoration: underline;
        }
        .orange-asterisk {
            color: #ff6600;
            font-weight: bold;
            margin-right: 5px;
        }
        .points, .author {
            color: #828282;
            font-size: 12px;
            margin-top: 5px;
        }
        /* Flexbox para alinear los campos en el formulario */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            margin-top: 10px;
        }
        .form-group label {
            margin-right: 10px;
        }
        .form-group input[type="text"] {
            width: 60%; /* Ajustar el ancho del campo de texto */
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .container button {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #e55b00;
        }
    </style>
</head>
<body>

    <!-- Contenedor principal que engloba la cabecera y el contenido -->
    <div class="main-container">
        <!-- Cabecera -->
        <div class="header">
            <span class="pagetop">
                <b class="hnname">
                    <a href="/news">Confirm</a>
                </b>
            </span>
        </div>

        <!-- Contenedor del contenido -->
        <div class="container">
            <div class="news-item">
                <span class="orange-asterisk">*</span> 
                <a href="{{ submission.url }}">{{ submission.title }}</a> 
                {% if shortened_url %}
                <a href="{{ submission.url }}">({{ shortened_url }})</a> 
                {% endif %}
                <div class="author">
                    <span class="points">{{ submission.points }} points</span>
                    by <a href="{% url 'accounts:author_profile' submission.author.username %}">{{ submission.author.username }}</a> on 
                    <a href="{% url 'submission_detail' pk=submission.pk %}">{{ time_ago }}</a>
                    | <a href="{% url 'edit_submission' pk=submission.pk %}">edit</a> | <a href="#">delete</a>
                </div>
            </div>

            <!-- Formulario de eliminación -->
            <form method="post" action="{% url 'delete_submission' pk=submission.pk %}">
                {% csrf_token %}
                <p>Do you want this to be deleted?</p>
                <button type="submit" name="confirm" value="yes">Yes</button>
                <button type="submit" name="confirm" value="no">No</button>
            </form>
        </div>
    </div>

</body>
</html>
