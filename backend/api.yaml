openapi: 3.0.0
info:
  title: "API de Hacker News"
  description: "API para la web de Hacker News."
  version: "1.0.0"

servers:
  - url: 'https://aswproject.onrender.com'
  
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization  # Aquí se espera la API Key, generalmente en el encabezado 'Authorization'

security:
  - ApiKeyAuth: []

paths:

  /api/news:
    get:
      summary: "Retrieve news submissions"
      description: "API endpoint to retrieve news submissions, optionally filtered by a search query."
      parameters:
        - name: query
          in: query
          description: "Search term to filter submissions by title"
          required: false
          schema:
            type: string
      responses:
        '200':
          description: "A JSON response containing the list of news submissions"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: "ID de la submission"
                      example: 1
                    title:
                      type: string
                      description: "Título de la submission"
                      example: "Example submission"
                    points:
                      type: integer
                      description: "Número de puntos de la submission"
                      example: 10
                    submission_type:
                      type: string
                      description: "Tipo de submission"
                      example: "url"
                    time_ago:
                      type: string
                      description: "Tiempo que ha pasado desde la creación de la submission"
                      example: "19 hours ago"
                    num_comments:
                      type: string
                      description: "Número de comentarios de la submission"
                      example: "discuss"
                    has_voted:
                      type: boolean
                      description: "Indica si el usuario ha votado en la submission"
                      example: false
        '400':
          description: "Solicitud incorrecta, el término de búsqueda no es válido."
        '401':
          description: "No autorizado, se requiere autenticación para acceder al recurso."

  /api/ask:
    get:
      summary: "Recuperar submissions de tipo 'ask'"
      description: "Este endpoint devuelve una lista de submissions de tipo 'ask', filtradas por título si se proporciona un término de búsqueda."
      parameters:
        - name: "query"
          in: "query"
          description: "Término de búsqueda para filtrar submissions por título."
          required: false
          schema:
            type: string
            example: "¿Cómo programar en Python?"
      responses:
        '200':
          description: "Una respuesta JSON con la lista de submissions de tipo 'ask'."
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: "ID de la submission"
                      example: 9
                    title:
                      type: string
                      description: "Título de la submission"
                      example: "Modificado"
                    author:
                      type: string
                      description: "Autor de la submission"
                      example: "laia"
                    points:
                      type: integer
                      description: "Número de puntos de la submission"
                      example: 1
                    submission_type:
                      type: string
                      description: "Tipo de submission"
                      example: "ask"
                    time_ago:
                      type: string
                      description: "Tiempo que ha pasado desde la creación de la submission"
                      example: "19 hours ago"
                    num_comments:
                      type: string
                      description: "Número de comentarios de la submission"
                      example: "discuss"
                    has_voted:
                      type: boolean
                      description: "Indica si el usuario ha votado en la submission"
                      example: false
        '400':
          description: "Solicitud incorrecta, el término de búsqueda no es válido."
        '401':
          description: "No autorizado, se requiere autenticación para acceder al recurso."

  /api/newest:
    get:
      summary: "Retrieve the newest submissions"
      description: "API endpoint to retrieve the newest submissions, optionally filtered by a search query."
      parameters:
        - name: query
          in: query
          description: "Search term to filter submissions by title"
          required: false
          schema:
            type: string
      responses:
        '200':
          description: "A JSON response containing the list of newest submissions"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: "ID de la submission"
                      example: 1
                    title:
                      type: string
                      description: "Título de la submission"
                      example: "Example submission"
                    points:
                      type: integer
                      description: "Número de puntos de la submission"
                      example: 1
                    submission_type:
                      type: string
                      description: "Tipo de submission"
                      example: "ask"
                    time_ago:
                      type: string
                      description: "Tiempo que ha pasado desde la creación de la submission"
                      example: "19 hours ago"
                    num_comments:
                      type: string
                      description: "Número de comentarios de la submission"
                      example: "discuss"
                    has_voted:
                      type: boolean
                      description: "Indica si el usuario ha votado en la submission"
                      example: false
        '400':
          description: "Solicitud incorrecta, el término de búsqueda no es válido."
        '401':
          description: "No autorizado, se requiere autenticación para acceder al recurso."
          
  /api/threads:
    get:
      summary: "Retrieve user comments and replies"
      description: "API endpoint to retrieve comments and replies made by the authenticated user."
      security:
        - ApiKeyAuth: []  # Este endpoint requiere la API Key para acceder
      responses:
        '200':
          description: "A JSON response containing the list of user comments and replies"
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: "ID del comentario"
                          example: 1
                        content:
                          type: string
                          description: "Contenido del comentario"
                          example: "Este es un comentario de ejemplo"
                        created_at:
                          type: string
                          format: date-time
                          description: "Fecha de creación del comentario"
                          example: "2023-10-01T12:34:56Z"
                        time_ago:
                          type: string
                          description: "Tiempo que ha pasado desde la creación del comentario"
                          example: "2 hours ago"
                        has_voted:
                          type: boolean
                          description: "Indica si el usuario ha votado en el comentario"
                          example: false
        '403':
          description: "No autorizado, se requiere autenticación para acceder al recurso."

  /api/hidden_submissions:
    get:
      summary: "Retrieve hidden submissions"
      description: "API endpoint to retrieve hidden submissions for the authenticated user."
      security:
        - ApiKeyAuth: []  # Este endpoint requiere la API Key para acceder
      responses:
        '200':
          description: "A JSON response containing the list of hidden submissions"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: "ID de la submission"
                      example: 1
                    title:
                      type: string
                      description: "Título de la submission"
                      example: "Example submission"
                    points:
                      type: integer
                      description: "Número de puntos de la submission"
                      example: 1
                    submission_type:
                      type: string
                      description: "Tipo de submission"
                      example: "ask"
                    time_ago:
                      type: string
                      description: "Tiempo que ha pasado desde la creación de la submission"
                      example: "19 hours ago"
                    num_comments:
                      type: string
                      description: "Número de comentarios de la submission"
                      example: "discuss"
                    has_voted:
                      type: boolean
                      description: "Indica si el usuario ha votado en la submission"
                      example: false
        '403':
          description: "No autorizado, se requiere autenticación para acceder al recurso."

  /api/submit:
      post:
        summary: "Create a new submission"
        description: "API endpoint to create a new submission. The submission can be of type 'url' or 'ask'."
        security:
          - ApiKeyAuth: []  # Este endpoint requiere la API Key para acceder
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: "Título de la submission"
                    example: "Example submission"
                  url:
                    type: string
                    description: "URL de la submission (opcional)"
                    example: "https://example.com"
                  text:
                    type: string
                    description: "Texto de la submission (opcional)"
                    example: "Este es un texto de ejemplo"
        responses:
          '201':
            description: "Submission created successfully"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    detail:
                      type: string
                      description: "Mensaje de éxito"
                      example: "Submission created successfully"
                    submission:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: "ID de la submission"
                          example: 1
                        title:
                          type: string
                          description: "Título de la submission"
                          example: "Example submission"
                        url:
                          type: string
                          description: "URL de la submission"
                          example: "https://example.com"
                        text:
                          type: string
                          description: "Texto de la submission"
                          example: "Este es un texto de ejemplo"
                        submission_type:
                          type: string
                          description: "Tipo de submission"
                          example: "url"
                        author:
                          type: string
                          description: "Autor de la submission"
                          example: "username"
                        
          '200':
            description: "Submission already exists"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    detail:
                      type: string
                      description: "Mensaje indicando que la submission ya existe"
                      example: "Submission already exists"
                    submission:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: "ID de la submission"
                          example: 1
                        title:
                          type: string
                          description: "Título de la submission"
                          example: "Example submission"
                        url:
                          type: string
                          description: "URL de la submission"
                          example: "https://example.com"
                        text:
                          type: string
                          description: "Texto de la submission"
                          example: "Este es un texto de ejemplo"
                        submission_type:
                          type: string
                          description: "Tipo de submission"
                          example: "url"
                        author:
                          type: string
                          description: "Autor de la submission"
                          example: "username"
                        created_at:
                          type: string
                          format: date-time
                          description: "Fecha de creación de la submission"
                          example: "2023-10-01T12:34:56Z"
          '400':
            description: "Invalid data"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    detail:
                      type: string
                      description: "Mensaje de error"
                      example: "Invalid data"
                    errors:
                      type: object
                      description: "Detalles de los errores de validación"
          '403':
            description: "No autorizado, se requiere autenticación para acceder al recurso."

  /api/submission/{pk}:
    get:
      summary: "Get submission details and comments"
      description: "Retrieve detailed information about a specific submission including its comments. Public access allowed."
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to retrieve"
          schema:
            type: integer
      responses:
        '200':
          description: "Successfully retrieved submission details"
          content:
            application/json:
              schema:
                type: object
                properties:
                  submission:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID de la submission"
                        example: 1
                      title:
                        type: string
                        description: "Título de la submission"
                        example: "Example submission"
                      url:
                        type: string
                        description: "URL original de la submission"
                        example: "https://example.com"
                      shortened_url:
                        type: string
                        description: "URL acortada de la submission"
                        example: "example.com"
                      text:
                        type: string
                        description: "Texto de la submission"
                        example: "Este es un texto de ejemplo"
                      author:
                        type: string
                        description: "Autor de la submission"
                        example: "username"
                      time_ago:
                        type: string
                        description: "Tiempo transcurrido desde la creación"
                        example: "2 hours ago"
                      num_comments:
                        type: integer
                        description: "Número total de comentarios"
                        example: 5
                      has_voted:
                        type: boolean
                        description: "Indica si el usuario autenticado ha votado"
                        example: false
                  comments:
                    type: array
                    description: "Lista de comentarios principales"
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: "ID del comentario"
                          example: 1
                        content:
                          type: string
                          description: "Contenido del comentario"
                          example: "Este es un comentario"
                        author:
                          type: string
                          description: "Autor del comentario"
                          example: "username"
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "No Submission matches the given query."
                    
    delete:
      summary: "Delete a submission"
      description: "Deletes a specific submission by ID. Only the author of the submission can perform this action."
      security:
        - ApiKeyAuth: []  # Este endpoint requiere autenticación
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to delete"
          schema:
            type: integer
      responses:
        '200':  # Código de respuesta para indicar éxito con un mensaje
          description: "Submission deleted successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Submission deleted successfully."
        '403':
          description: "Forbidden. The authenticated user does not have permission to delete this submission."
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "You do not have permission to delete this submission."
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Not found."


    put:
      summary: "Update a submission"
      description: "Update a specific submission. Only the author of the submission can update it."
      security:
        - ApiKeyAuth: []  # Este endpoint requiere autenticación
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to update"
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: "Título de la submission"
                  example: "Updated submission title"
                text:
                  type: string
                  description: "Texto de la submission"
                  example: "Updated submission text"
      responses:
        '200':
          description: "Submission updated successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de éxito"
                    example: "Submission updated successfully"
                  submission:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID de la submission"
                        example: 1
                      title:
                        type: string
                        description: "Título de la submission"
                        example: "Updated submission title"
                      url:
                        type: string
                        description: "URL original de la submission"
                        example: "https://example.com"
                      shortened_url:
                        type: string
                        description: "URL acortada de la submission"
                        example: "example.com"
                      text:
                        type: string
                        description: "Texto de la submission"
                        example: "Updated submission text"
                      author:
                        type: string
                        description: "Autor de la submission"
                        example: "username"
                      time_ago:
                        type: string
                        description: "Tiempo transcurrido desde la creación"
                        example: "2 hours ago"
                      num_comments:
                        type: integer
                        description: "Número total de comentarios"
                        example: 5
                      has_voted:
                        type: boolean
                        description: "Indica si el usuario autenticado ha votado"
                        example: false
        '400':
          description: "Invalid data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "Invalid data"
                  errors:
                    type: object
                    description: "Detalles de los errores de validación"
        '403':
          description: "Permission denied"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "You do not have permission to edit this submission."
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "Not found."
    
    post:
      summary: "Add a comment to a submission"
      description: "Add a comment to a specific submission. Users cannot comment on their own submissions."
      security:
        - ApiKeyAuth: []
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to comment on"
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: "Contenido del comentario"
                  example: "Este es un comentario de ejemplo"
      responses:
        '201':
          description: "Comment added successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de éxito"
                    example: "Comment added successfully."
                  submission:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID de la submission"
                        example: 1
                      title:
                        type: string
                        description: "Título de la submission"
                        example: "Example submission"
                      url:
                        type: string
                        description: "URL original de la submission"
                        example: "https://example.com"
                      shortened_url:
                        type: string
                        description: "URL acortada de la submission"
                        example: "example.com"
                      text:
                        type: string
                        description: "Texto de la submission"
                        example: "Este es un texto de ejemplo"
                      author:
                        type: string
                        description: "Autor de la submission"
                        example: "username"
                      time_ago:
                        type: string
                        description: "Tiempo transcurrido desde la creación"
                        example: "2 hours ago"
                      num_comments:
                        type: integer
                        description: "Número total de comentarios"
                        example: 5
                      has_voted:
                        type: boolean
                        description: "Indica si el usuario autenticado ha votado"
                        example: false
                  comments:
                    type: array
                    description: "Lista de comentarios principales"
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: "ID del comentario"
                          example: 1
                        text:
                          type: string
                          description: "Contenido del comentario"
                          example: "Este es un comentario"
                        author:
                          type: string
                          description: "Autor del comentario"
                          example: "username"
        '400':
          description: "Invalid data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "Invalid data"
                  errors:
                    type: object
                    description: "Detalles de los errores de validación"
        '403':
          description: "Permission denied"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "You cannot comment on your own submission."
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "Not found."

  /api/submission/{pk}/vote:
    post:
      summary: "Upvote a submission"
      description: "Vote (upvote) on a specific submission. Users cannot vote on their own submissions. If the user has already voted, an error will be returned."
      security:
        - ApiKeyAuth: []
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to upvote"
          schema:
            type: integer
      responses:
        '200':
          description: "Submission upvoted successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de éxito"
                    example: "Submission upvoted successfully."
                  submission:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID de la submission"
                        example: 1
                      title:
                        type: string
                        description: "Título de la submission"
                        example: "Example submission"
                      url:
                        type: string
                        description: "URL original de la submission"
                        example: "https://example.com"
                      shortened_url:
                        type: string
                        description: "URL acortada de la submission"
                        example: "example.com"
                      text:
                        type: string
                        description: "Texto de la submission"
                        example: "Este es un texto de ejemplo"
                      author:
                        type: string
                        description: "Autor de la submission"
                        example: "username"
                      time_ago:
                        type: string
                        description: "Tiempo transcurrido desde la creación"
                        example: "2 hours ago"
                      num_comments:
                        type: integer
                        description: "Número total de comentarios"
                        example: 5
                      has_voted:
                        type: boolean
                        description: "Indica si el usuario autenticado ha votado"
                        example: true
        '400':
          description: "Permission denied or already voted"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "You cannot vote on your own submission or you have already voted."
        '403':
          description: "Unauthorized, authentication required"
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "No Submission matches the given query."
  
    delete:
      summary: "Downvote a submission"
      description: "Remove a vote (downvote) from a specific submission. Users cannot remove votes from their own submissions. If the user has not voted, an error will be returned."
      security:
        - ApiKeyAuth: []
      parameters:
        - name: pk
          in: path
          required: true
          description: "ID of the submission to downvote"
          schema:
            type: integer
      responses:
        '200':
          description: "Submission downvoted successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de éxito"
                    example: "Submission downvoted successfully."
                  submission:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID de la submission"
                        example: 1
                      title:
                        type: string
                        description: "Título de la submission"
                        example: "Example submission"
                      url:
                        type: string
                        description: "URL original de la submission"
                        example: "https://example.com"
                      shortened_url:
                        type: string
                        description: "URL acortada de la submission"
                        example: "example.com"
                      text:
                        type: string
                        description: "Texto de la submission"
                        example: "Este es un texto de ejemplo"
                      author:
                        type: string
                        description: "Autor de la submission"
                        example: "username"
                      time_ago:
                        type: string
                        description: "Tiempo transcurrido desde la creación"
                        example: "2 hours ago"
                      num_comments:
                        type: integer
                        description: "Número total de comentarios"
                        example: 5
                      has_voted:
                        type: boolean
                        description: "Indica si el usuario autenticado ha votado"
                        example: false
        '400':
          description: "Permission denied or no vote to remove"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "You cannot remove a vote from your own submission or you haven't voted yet."
        '403':
          description: "Unauthorized, authentication required"
        '404':
          description: "Submission not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: "Mensaje de error"
                    example: "No Submission matches the given query."

  /api/submission/{pk}/favorite:
    post:
      summary: "Add a submission to favorites"
      description: "Mark a specific submission as favorite. Only authenticated users can perform this action."
      security:
        - ApiKeyAuth: []
      parameters:
        - name: pk
          in: path
          required: true
