  # Corrección para el endpoint /api/profile
  /api/profile:
    get:
      summary: "Retrieve user profile"
      description: "API endpoint to retrieve the authenticated user's profile information."
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: "A JSON response containing the user profile information"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: "ID del perfil"
                    example: 1
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID del usuario"
                        example: 1
                      username:
                        type: string
                        description: "Nombre de usuario"
                        example: "john_doe"
                  about:
                    type: string
                    description: "Descripción del perfil del usuario"
                    example: "Desarrollador full-stack"
                  karma:
                    type: integer
                    description: "Puntos de karma del usuario"
                    example: 150
                  created_at:
                    type: string
                    format: date-time
                    description: "Fecha de creación del perfil"
                    example: "2023-10-01T12:34:56Z"
                  image_url:
                    type: string
                    description: "URL de la imagen de perfil"
                    example: "https://example.com/profile.jpg"
                  banner_url:
                    type: string
                    description: "URL de la imagen de banner"
                    example: "https://example.com/banner.jpg"
        '401':
          description: "No autorizado, se requiere autenticación para acceder al recurso."
    post:
      summary: "Update user profile"
      description: "API endpoint to update the authenticated user's profile information, including the 'about' field, profile image, and banner."
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                about:
                  type: string
                  description: "Nueva descripción del perfil"
                  example: "Desarrollador fullstack con experiencia en Django y React"
                imagen:
                  type: string
                  format: binary
                  description: "Archivo de imagen para actualizar la imagen de perfil"
                banner:
                  type: string
                  format: binary
                  description: "Archivo de imagen para actualizar el banner del perfil"
      responses:
        '200':
          description: "Perfil actualizado exitosamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: "Mensaje de éxito"
                    example: "Perfil actualizado exitosamente"
                  updated_fields:
                    type: array
                    items:
                      type: string
                    description: "Lista de campos actualizados"
                    example: ["about", "imagen"]
                  profile:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "ID del perfil"
                        example: 1
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: "ID del usuario"
                            example: 1
                          username:
                            type: string
                            description: "Nombre de usuario"
                            example: "john_doe"
                      about:
                        type: string
                        description: "Nueva descripción del perfil"
                        example: "Desarrollador fullstack con experiencia en Django y React"
                      karma:
                        type: integer
                        description: "Puntos de karma del usuario"
                        example: 150
                      created_at:
                        type: string
                        format: date-time
                        description: "Fecha de creación del perfil"
                        example: "2023-10-01T12:34:56Z"
                      image_url:
                        type: string
                        description: "URL de la imagen de perfil"
                        example: "https://s3.amazonaws.com/bucket/profiles/username_profile_123456.jpg"
                      banner_url:
                        type: string
                        description: "URL del banner del perfil"
                        example: "https://s3.amazonaws.com/bucket/banners/username_banner_123456.jpg"
        '400':
          description: "Error en los datos proporcionados"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Mensaje de error"
                    example: "No se proporcionó imagen o banner"
        '401':
          description: "No autorizado"

    
  /api/profile/media/{media_type}:
    delete:
      summary: "Delete profile media (image or banner)"
      description: "Remove the custom profile image or banner and restore the default one."
      parameters:
        - name: "media_type"
          in: "path"
          description: "The type of media to delete (either 'image' or 'banner')."
          required: true
          schema:
            type: string
            enum:
              - "image"
              - "banner"
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: "Media deleted successfully or no custom media to delete"
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      message:
                        type: string
                        description: "Success message"
                        example: "Image deleted successfully"  # or "Banner deleted successfully"
                      profile:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: "Profile ID"
                            example: 1
                          imagen_perfil_url:
                            type: string
                            description: "Default profile image URL (if media type is 'image')"
                            example: "https://example.com/default-profile.jpg"
                          banner_perfil_url:
                            type: string
                            description: "Default banner URL (if media type is 'banner')"
                            example: "https://example.com/default-banner.jpg"
                  - type: object
                    properties:
                      message:
                        type: string
                        description: "Information message"
                        example: "No custom image to delete"  # or "No custom banner to delete"
        '400':
          description: "Invalid media type provided"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message"
                    example: "Invalid media type"
        '404':
          description: "No custom media found to delete"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message"
                    example: "No custom image or banner to delete"
        '401':
          description: "Unauthorized - Authentication required"
